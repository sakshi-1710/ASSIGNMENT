<!DOCTYPE html>
<html>
<head>
    <title>Assignment II</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 30px;
        }

        h1{
            color: #4f7d6d;
            margin-bottom: 20px;
        }

        .container{
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: 200px 200px 200px;
            gap: 20px;
            max-width: 1000px;
        }

        .container img{
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .fruit1{ grid-column: 1 / 2; grid-row: 1 / 2; }
        .fruit2{ grid-column: 2 / 3; grid-row: 1 / 2; }
        .fruit3{ grid-column: 3 / 4; grid-row: 1 / 3; }
        .fruit4{ grid-column: 1 / 3; grid-row: 2 / 3; }
        .fruit5{ grid-column: 1 / 3; grid-row: 3 / 4; }
        .fruit6{ grid-column: 3 / 4; grid-row: 3 / 4; }

    </style>
</head>

<body>

<h1>Assignment II</h1>

<div class="container">

    <!-- 1. Grapes -->
    <img src="https://images.unsplash.com/photo-1537640538966-79f369143f8f" class="fruit1">

    <!-- 2. Strawberry -->
    <img src="https://images.unsplash.com/photo-1464965911861-746a04b4bca6" class="fruit2">

    <!-- 3. Watermelon -->
    <img src="https://images.unsplash.com/photo-1563114773-84221bd62daa" class="fruit3">

    <!-- 4. Mango -->
    <img src="https://images.unsplash.com/photo-1601493700631-2b16ec4b4716" class="fruit4">

    <!-- 5. Papaya -->
    <img src="https://images.unsplash.com/photo-1582284540020-8acbe03f4924" class="fruit5">

    <!-- 6. Pineapple -->
    <img src="https://images.unsplash.com/photo-1550258987-190a2d41a8ba" class="fruit6">

</div>

</body>
</html>
