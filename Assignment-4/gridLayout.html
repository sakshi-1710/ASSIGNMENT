<!DOCTYPE html>
<html>
<head>
    <title>Grid Layout</title>

    <style>

        body{
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        .container{
            width: 700px;
            height: 500px;
            border: 8px solid black;
            padding: 15px;
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            grid-template-rows: 80px 60px 1fr 80px;
            gap: 10px;
            background-color: white;
        }

        .box{
            border: 3px solid rosybrown;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            color: grey;
            font-weight: bold;
        }

        .header{
            grid-column: 1 / 4;
        }

        .nav{
            grid-column: 1 / 4;
        }

        .left{
            grid-column: 1 / 2;
        }

        .main{
            grid-column: 2 / 3;
        }

        .right{
            grid-column: 3 / 4;
        }

        .footer{
            grid-column: 1 / 4;
        }

    </style>
</head>

<body>

<div class="container">

    <div class="box header">Header</div>
    <div class="box nav">Navigation Menu</div>
    <div class="box left">Content</div>
    <div class="box main">Main Content</div>
    <div class="box right">Content</div>
    <div class="box footer">Footer</div>

</div>

</body>
</html>
