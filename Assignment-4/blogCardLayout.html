<!DOCTYPE html>
<html>
<head>
    <title>Blog Grid Layout</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 40px;
        }

        .container{
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-auto-rows: 200px;
            gap: 20px;
            max-width: 1100px;
            margin: auto;
        }

        .card{
            position: relative;
            color: white;
            display: flex;
            align-items: flex-end;
            padding: 20px;
            font-size: 18px;
            font-weight: bold;
            background-size: cover;
            background-position: center;
        }

        .card span{
            position: absolute;
            bottom: 15px;
            right: 20px;
            font-size: 12px;
            opacity: 0.8;
        }

        /* Grid placements */

        .card1{
            grid-column: 1 / 2;
            background-image: url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e");
        }

        .card2{
            grid-column: 2 / 4;
            background-image: url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee");
        }

        .card3{
            grid-column: 1 / 3;
            background-image: url("https://images.unsplash.com/photo-1493558103817-58b2924bce98");
        }

        .card4{
            grid-column: 3 / 4;
            background-image: url("https://images.unsplash.com/photo-1492724441997-5dc865305da7");
        }

        .card5{
            background-image: url("https://images.unsplash.com/photo-1470770841072-f978cf4d019e");
        }

        .card6{
            background-image: url("https://images.unsplash.com/photo-1501785888041-af3ef285b470");
        }

        .card7{
            background-image: url("https://images.unsplash.com/photo-1495567720989-cebdbdd97913");
        }

    </style>
</head>

<body>

<div class="container">

    <div class="card card1">
        The winter of my discontent
        <span>READ POST</span>
    </div>

    <div class="card card2">
        Instagram is toxic but I keep posting
        <span>READ POST</span>
    </div>

    <div class="card card3">
        Throwing my phone into the ocean
        <span>READ POST</span>
    </div>

    <div class="card card4">
        I'm never leaving my room
        <span>READ POST</span>
    </div>

    <div class="card card5">Staring at the horizon thinking</div>
    <div class="card card6">This is water</div>
    <div class="card card7">Table for two please</div>

</div>

</body>
</html>
