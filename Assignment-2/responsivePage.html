<!DOCTYPE html>
<html>
<head>
    <title>Responsive Landing Page</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .hero {
            height: 100vh;
            background: url("https://via.placeholder.com/1500x800") no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            color: white;
            text-align: center;
        }

        /* Overlay */
        .hero::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
        }

        .hero-content {
            position: relative;
            max-width: 700px;
            padding: 20px;
        }

        .hero h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .hero p {
            font-size: 20px;
            margin-bottom: 25px;
        }

        .hero button {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            background-color:blue;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .hero button:hover {
            background-color: green;
        }

        /* Responsive Typography */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 32px;
            }

            .hero p {
                font-size: 16px;
            }

            .hero {
                padding: 20px;
            }
        }
    </style>

</head>

<body>

    <section class="hero">
        <div class="hero-content">
            <h1>Welcome to My Website</h1>
            <p>
                Build modern and responsive websites using HTML and CSS.
                Start your journey in web development today.
            </p>
            <button>Get Started</button>
        </div>
    </section>

</body>
</html>
