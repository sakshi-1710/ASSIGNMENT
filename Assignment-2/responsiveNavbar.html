<!DOCTYPE html>
<html>
<head>
    <title>Responsive Navbar</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f4f4;
        }

        nav {
            background: #222;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 20px;
            font-weight: bold;
        }

        .menu {
            display: flex;
            list-style: none;
            gap: 25px;
        }

        .menu li a {
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }

        .menu li a:hover {
            color: #00bcd4;
        }

        /* Hamburger */
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
        }

        .hamburger div {
            width: 25px;
            height: 3px;
            background: white;
        }

        /* Mobile Styles */
        @media (max-width: 768px) {
            .menu {
                position: absolute;
                top: 60px;
                right: 0;
                background: #222;
                width: 100%;
                flex-direction: column;
                text-align: center;
                display: none;
                padding: 20px 0;
            }

            .menu.active {
                display: flex;
            }

            .hamburger {
                display: flex;
            }
        }
    </style>

</head>

<body>

    <nav>
        <div class="logo">MyLogo</div>

        <ul class="menu" id="menu">
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Contact</a></li>
        </ul>

        <div class="hamburger" onclick="toggleMenu()">
            <div></div>
            <div></div>
            <div></div>
        </div>
    </nav>

    <script>
        function toggleMenu() {
            document.getElementById("menu").classList.toggle("active");
        }
    </script>

</body>
</html>
