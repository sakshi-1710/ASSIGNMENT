<!DOCTYPE html>
<html>
<head>
    <title>Profile Card</title>

    <style>
        .card {
            width: 300px;
            margin: 50px ; 
            text-align: center;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            padding: 20px;
            background-color:red;
        }

        .card img {
            width: 120px;
            border-radius: 50%;
        }

        .card button {
            margin-top: 15px;
            padding: 8px 15px;
            border: none;
            border-radius: 8px;
            background-color: blue;
            color: black;
            cursor: pointer;
        }

        .card button:hover {
            background-color: green;
        }
    </style>

</head>

<body>

    <div class="card">
        <img src="https://via.placeholder.com/120" alt="Profile Image">
        <h2>Sakshi Goingade</h2>
        <p>
            I am a web development student who loves creating websites 
            using HTML, CSS, and JavaScript.
        </p>
        <button>Contact Me</button>
    </div>

</body>
</html>
