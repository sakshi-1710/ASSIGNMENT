<!DOCTYPE html>
<html>
<head>
    <title>Pricing Table UI</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f4f4;
            padding: 50px 20px;
        }

        .pricing-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px; /* Consistent spacing */
            max-width: 1000px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .card h2 {
            margin-bottom: 15px;
        }

        .price {
            font-size: 28px;
            margin: 15px 0;
            font-weight: bold;
        }

        .features {
            list-style: none;
            margin: 20px 0;
        }

        .features li {
            margin: 10px 0;
        }

        .card button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            background: #007bff;
            color: white;
            cursor: pointer;
        }

        .card button:hover {
            background: #0056b3;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .pricing-container {
                grid-template-columns: 1fr;
            }
        }
    </style>

</head>

<body>

    <div class="pricing-container">

        <!-- Basic Plan -->
        <div class="card">
            <h2>Basic</h2>
            <div class="price">₹499/month</div>
            <ul class="features">
                <li>5 Projects</li>
                <li>Basic Support</li>
                <li>Limited Storage</li>
            </ul>
            <button>Buy Now</button>
        </div>

        <!-- Pro Plan -->
        <div class="card">
            <h2>Pro</h2>
            <div class="price">₹999/month</div>
            <ul class="features">
                <li>15 Projects</li>
                <li>Priority Support</li>
                <li>Unlimited Storage</li>
            </ul>
            <button>Buy Now</button>
        </div>

        <!-- Premium Plan -->
        <div class="card">
            <h2>Premium</h2>
            <div class="price">₹1499/month</div>
            <ul class="features">
                <li>Unlimited Projects</li>
                <li>24/7 Support</li>
                <li>Advanced Features</li>
            </ul>
            <button>Buy Now</button>
        </div>

    </div>

</body>
</html>
