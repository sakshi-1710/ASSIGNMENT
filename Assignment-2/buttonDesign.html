<!DOCTYPE html>
<html>
<head>
    <title>Simple Button Design</title>

    <style>
        .primary-btn {
            background-color:red;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .primary-btn:hover {
            background-color: darkblue;
        }

        .secondary-btn {
            background-color: gray;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .secondary-btn:hover {
            background-color: yellow;
        }
    </style>

</head>

<body>

    <button class="primary-btn">Primary Button</button>
    <button class="secondary-btn">Secondary Button</button>

</body>
</html>
