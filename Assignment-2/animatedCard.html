<!DOCTYPE html>
<html>
<head>
    <title>Animated Card Hover Effect</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            width: 300px;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card img {
            width: 100%;
            display: block;
            transition: transform 0.3s ease;
        }

        .card-content {
            padding: 20px;
            text-align: center;
        }

        /* Hover Effects */
        .card:hover {
            transform: translateY(-10px); /* Lift up */
            box-shadow: 0 10px 20px rgba(0,0,0,0.4); /* Deeper shadow */
        }

        .card:hover img {
            transform: scale(1.05); /* Image zoom */
        }
    </style>

</head>

<body>

    <div class="card">
        <img src="https://via.placeholder.com/300x200" alt="Card Image">
        <div class="card-content">
            <h2>Beautiful Design</h2>
            <p>Hover over this card to see the animation effect.</p>
        </div>
    </div>

</body>
