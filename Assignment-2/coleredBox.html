<!DOCTYPE html>
<html>
<head>
    <title>Colored Box</title>

    <style>
        .box {
            width: 200px;
            height: 200px;
            background-color: lightblue;
            border: 3px solid blue;
            border-radius: 20px;
            text-align: center;
            line-height: 200px; /* Centers text vertically */
            font-size: 20px;
            margin: 50px auto; /* Centers box horizontally */
        }
        .box : hover{

        }
    </style>

</head>

<body>

    <div class="box">
        Hello Sakshi
    </div>

</body>
</html>
