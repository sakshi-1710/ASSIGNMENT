<!DOCTYPE html>
<html>
<head>
    <title>Vertical Navigation Menu</title>

    <style>
        .menu {
            width: 200px;
        }

        .menu a {
            display: block;              /* Makes links vertical */
            padding: 12px;               /* Space inside menu item */
            text-decoration: none;
            background-color: lightgray;
            color: black;
        }

        .menu a:hover {
            background-color: purple;      /* Changes color on hover */
            color: white;
        }
    </style>

</head>

<body>

    <div class="menu">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </div>

</body>
</html>
